# Live-reload config for `air` (https://github.com/air-verse/air).
# Run with: make dev

root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./examples/agent-stream"
  bin = "./tmp/main"
  include_ext = ["go", "tpl", "tmpl", "html", "proto", "avsc"]
  exclude_dir = ["dist", "tmp", "certs", "gin"]
  exclude_regex = ["_test.go$"]
  delay = 200

[log]
  time = true

[color]
  app = "cyan"
  build = "yellow"
  runner = "green"
